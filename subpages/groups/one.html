<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group 1 - Asobi Lab.</title>
  
  <!-- 共通スクリプト -->
  <script src="/asobiseminar/js/load-css.js"></script>
  <script src="/asobiseminar/js/setThemeColor.js"></script>
  <!-- 新ナビシステム -->
  <script src="/asobiseminar/nav/nav-core.js"></script>
  <script src="/asobiseminar/nav/nav-particle.js"></script>
</head>
<body>

  <!-- メニューHTML自動生成（nav-core.jsで完全生成） -->

  <main class="app-container">
    <header style="margin-bottom: 60px;">
      <h1 style="color: var(--main-color); font-size: 3rem; font-weight: 900; text-shadow: 0 4px 12px rgba(0,0,0,0.3); letter-spacing: 0.05em; margin-bottom: 16px;">🚀 Group 1</h1>
      <p style="opacity: 0.8; font-size: 1.1rem; margin: 0;">フロントエンド極限実験班</p>
    </header>

    <section style="margin-bottom: 60px; line-height: 1.8;">
      <h2 style="border-left: 5px solid var(--main-color); padding-left: 15px; color: var(--main-color); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px;">プロジェクト概要</h2>
      <p>Group 1 は、CSSアニメーションとJavaScriptの限界を超えたUI/UXを追求するグループです。最新のWebテクノロジーを駆使して、ユーザーを魅了する体験を創造します。</p>
    </section>

    <section style="margin-bottom: 60px;">
      <h2 style="border-left: 5px solid var(--balance-color); padding-left: 15px; color: var(--balance-color); font-size: 1.8rem; font-weight: 800; margin-bottom: 20px;">研究内容</h2>
      <div class="task-board">
        <div class="task-box" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 16px; border-left: 4px solid var(--main-color);">
          <strong style="color: var(--main-color);">アニメーション技術</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px; margin-bottom: 0;">Canvas, WebGL, SVG アニメーションの最先端技術</p>
        </div>
        <div class="task-box" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; margin-bottom: 16px; border-left: 4px solid var(--balance-color);">
          <strong style="color: var(--balance-color);">インタラクティブUI</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px; margin-bottom: 0;">ジェスチャー認識、リアルタイムフィードバック</p>
        </div>
        <div class="task-box" style="background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; border-left: 4px solid var(--variation-color);">
          <strong style="color: var(--variation-color);">パフォーマンス最適化</strong>
          <p style="opacity: 0.8; font-size: 0.9rem; margin-top: 8px; margin-bottom: 0;">60fps アニメーション、メモリ効率化</p>
        </div>
      </div>
    </section>

    <section style="text-align: center; margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--main-color);">
      <a href="/asobiseminar/subpages/groups/index.html" style="display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, var(--main-color), var(--balance-color)); color: var(--accent-color); border-radius: 8px; font-weight: bold; text-decoration: none; transition: all 0.3s;">➔ グループ一覧に戻る</a>
    </section>
  </main>

</body>
</html>
