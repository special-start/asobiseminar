<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>設定 - Asobi Seminar</title>
  <script src="/asobiseminar/js/load-css.js"></script>
  <script src="/asobiseminar/js/setThemeColor.js"></script>
</head>
<body style="margin: 0; padding: 40px; font-family: sans-serif; color: var(--variation-color); background: var(--accent-color); min-height: 100vh;">

  <main style="max-width: 400px; margin: 0 auto;">
    <h2 style="color: var(--main-color); margin-bottom: 24px;">テーマカラー設定</h2>
    
    <label style="display: block; margin-bottom: 8px; font-weight: bold;">テーマを選択</label>
    <select id="theme-select" style="display: block; width: 100%; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.1); color: var(--variation-color); border: 2px solid var(--main-color); border-radius: 6px; font-size: 1rem; outline: none;">
      <!-- 💡 ここにJSONの候補が確実に全自動で並びます -->
    </select>
    
    <button id="save-btn" style="width: 100%; padding: 14px; background: var(--main-color); color: var(--accent-color); border: none; border-radius: 6px; font-size: 1rem; font-weight: bold; cursor: pointer;">
      設定を保存する
    </button>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const selectEl = document.getElementById('theme-select');
      const saveBtn = document.getElementById('save-btn');

      try {
        // 確実なルート相対パスでJSONを取得して解析を待つ（await）
        const res = await fetch('/asobiseminar/themecolor.json');
        if (!res.ok) throw new Error();
        const themes = await res.json();

        selectEl.innerHTML = '';
        themes.forEach(theme => {
          const option = document.createElement('option');
          option.value = theme.name;
          option.textContent = theme.name;
          option.style.backgroundColor = '#1e293b';
          option.style.color = '#ffffff';
          selectEl.appendChild(option);
        });

        const currentTheme = localStorage.getItem('selectedTheme');
        if (currentTheme) {
          selectEl.value = currentTheme;
        }
      } catch (err) {
        console.error('JSONデータの構築タスクに失敗しました:', err);
      }

      saveBtn.addEventListener('click', () => {
        localStorage.setItem('selectedTheme', selectEl.value);
        alert('テーマ設定を脳内に記憶しました！');
        location.reload(); 
      });
    });
  </script>
</body>
</html>
